<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKINDO</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background:
        radial-gradient(circle at top left,
          rgba(201,169,97,0.08),
          transparent 35%),
        linear-gradient(
          135deg,
          #08111f 0%,
          #0f172a 50%,
          #1a2438 100%
        );

      color: #F8FAFC;
      font-family: Arial, sans-serif;
    }

    .loader {
      width: 70px;
      height: 70px;
      margin-bottom: 24px;
      animation: spin 1.4s linear infinite;
    }

    p {
      font-size: 15px;
      opacity: 0.8;
      letter-spacing: 0.05em;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
  </style>

  <script>
    setTimeout(() => {
      window.location.href = "html/login.html";
    }, 1200);
  </script>

</head>
<body>

  <img
    src="imgs/logos/logo_akindo.png"
    alt="AKINDO"
    class="loader"
  >

  <p>Carregando AKINDO...</p>

</body>
</html>
